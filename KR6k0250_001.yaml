body:
  text: 安國寺沙門澄照讚夫戒法者乃是成佛之源證聖之本七支若不清淨三昧無由現前故和四果因此而生十地假茲方尅斯則萬行之根本也千佛之𨊲轍也既善從戒起果籍同成授者必須令合法式或稱説相為羯磨或目翻邪為得戒或文增罔據或句減無憑此乃徒設劬勞不發戒品故梵網經云則為自欺誑亦誑他人能授者既獲輕垢之𠎝所受者何緣得清淨之戒今依聖教略集軌儀總作八門以成次第第一説受由序第二請聖證明第三翻邪歸依第四懺除往業第五説法開悟第六正發律儀第七示相護持第八發願回向第一由序者惟我釋迦慈父垂本願而現娑婆以大悲心演尸羅而濟惡趣戒者是成佛之本受者須有信心若也不起信心戒品無由得發然信不同有其兩種一者正信二者邪信邪信者何如信無想天處非非想處是真涅槃方尼揵陀若提子等可歸依境如此見者名為邪信正信者可知三乘菩提是真解脫三寶勝境是可歸依無上福田真能拔濟如此見者名為正信然此信心如水精珠能清濁水信心若發疑惑塵垢應念消除內心澄徹堪受如來清淨戒品故賢愚經云我觀諸衆生喻若中狗我欲將手拔還來咬我手已上經文如來以教為手衆生以信為手狗墜深坈之內欲反起毒心斯則自喪己身無由得出如來悲願力垂教拔濟有情不能發起信心反乃生其毀謗此則長淪生死無有解脫之期是故勸汝諸人令於三寶生信汝等盡能發心不如為一人應云是故我今勸汝令於三寶生信汝今能發淨信心否能者答言能次語云汝等既能發淨信心是則堪受如來淨戒所以要須受佛戒者薩遮尼揵子經云若不受佛戒野干之身尚不可得何況人身以是義故諸修行人要先受戒籍此為本衆行方生近感人天遠獲是果故遺教經云若無淨戒諸善功德不可得生以是當知戒為第一戒有多種淺深不同今將授者是近事五戒梵云塢婆素迦唐言近事男梵云塢婆斯迦唐云近事女親近承事佛法僧故舊云優婆塞此云清信男等謂能起清淨信心故也然此五戒是人身戒若能持者不失人身乃至修行得成佛果故華嚴經云戒是無上菩提本應當具足持淨戒若人能持是淨戒是則如來所讚歎又薩婆多論第七云我於無量劫中修菩薩行今得成佛心能解波羅提木叉以授衆生波羅提木叉者非世間法是背離世俗向涅槃門斯即戒如腳是能涉長衢又若浮囊能超苦海亦如關鍵不失內財譬若垣墻防其外賊戒之功德其大矣哉隨分讚揚相乃如是第二請證明者夫欲受戒者先須稽首請三寶以作證明各各䠒跪合掌自稱己名隨貧道請云弟子某甲稽首奉請十方諸佛諸大菩薩羅漢聖僧天龍八部護法善神業道冥宦罪福童子有天眼耳他心通者見聞知請起大慈悲降臨道場證明弟子回邪入正歸佛法僧懺洗罪𠎝受佛禁戒惟願三寶慈悲證明敬禮常住三寶如是三説復語云汝善男子善女人等或唯男唯女隨稱若一人須除等字如是至誠三請諸佛菩薩不捨本願必降道場我輩肉眼凡夫不能得見各各起殷重心普禮諸佛聖衆三拜第三翻邪應語彼云賢聖已集為汝證明汝等應當對三寶前立誓要期永捨邪魔及諸外道歸依三寶發正信心為佛弟子更不退轉能持不能者答能復語云汝等當知夫欲絶妄求真標心纍外必須仗託三寶以作津梁則能越生死之愛河登涅槃之彼岸故多論第七云譬如有人有罪畏故投向異國以求救護彼王語云汝求無畏莫出我境莫違我教必相救護衆生亦爾繫屬於魔有生死過患歸向三寶以求護若能誠心反無異向則魔邪惡無如之何已上論文魔則他化天主統攝欲界五趣入欲捨邪須歸三寶仗三寶力出魔境界若起一念邪心即出三寶境界若起一支戒即違三寶言教三寶雖悲則不救護以是義故勸汝歸依各各䠒跪合掌自稱己名隨貧道説云我某甲歸依於佛兩足中尊歸依於法離欲中尊歸依於僧諸衆中尊如來至真等正覺是我大師我今歸依更不歸餘邪魔外道惟願三寶慈悲攝受如是三説敬禮三寶禮已語云此是三歸更有三竟汝一心受我某甲歸依於佛兩足尊竟歸依於法離欲尊竟歸依於僧衆中尊竟從今已後稱佛為師更不歸餘邪魔外道惟願三寶慈悲攝受如是三説已敬禮常住三寶此三歸詞句依最勝無比經如來已下古來準十戒三歸義加此語既是翻邪理應語云更不歸餘邪魔外道等次應語云也汝等向所受者是翻邪三歸未發戒品所以名翻邪者為諸有情怖畏所逼意欲求脫不知正路妄歸山林樹神於制多園菀星辰日月外道天魔此等非勝福田不能拔濟故俱舍論云此歸依非勝此歸依非尊不由此歸依能解脫衆苦今以殷重淨心歸依三寶顯歸究竟是勝福田能拔有情令離生死故俱舍論云此歸依最勝此歸依最尊必由此歸依能解脫衆苦以是捨邪歸正故翻邪三歸劫劫生生永離邪魔為佛弟子是不示彼答云是復應語云汝等若是佛弟子者我今問汝隨我答自下問答依優婆塞經應云若歸依佛已寧捨身命終不歸於自在天等能持不彼答言能以外道執自在天為佛立像供養若歸依法已寧捨身命終不依於外道典籍能持不彼答云能若歸僧已寧捨身命終不依於外道邪衆能持不答云能復應讚云善哉善哉真是佛子從佛口生從法化生得佛法分大須慶幸各各生歡喜心普禮三寶三拜準最勝無比經若人供養三千世界滿中諸佛如稻麻等滿三萬歲所獲福德比前歸依百千萬分不及一又準經説三歸各有三善神守護也第四懺除應語彼云汝等當知凡欲受佛戒者必須懺惡業悔謝往𠎝洗滌身心皎然無纍方堪納受清淨尸羅所以然者譬如世間上饌不可置於弊器之中出世尸羅豈得授於有過身內故經云凡夫之人舉足動步無非是罪然所造罪雖謝於往為因成就必招苦果今須於惡生厭深責前𠎝於善生欣求永斷後犯志誠殷禱是罪皆除率爾輕浮業終難滅然罪無定性從緣而生從緣而滅從緣生者即是昔日遇惡知識染心造罪從緣滅者即是今日遇善知識洗心懺悔然罪纍衆多率陳難盡舉要而言不出十惡謂身有三非語有四過意有三惡合成十業此是根本餘是枝條但伐根本枝條自謝各各䠒跪虔誠合掌自稱己名隨貧道説弟子某甲自從無始曠大劫來至于今生始從今生至于今日於其中間隨逐惡緣縱身語意廣造諸罪身業不善行殺盜淫語業不善綺言妄語惡口兩舌意業不善貪瞋邪見或飲酒食肉餐噉葷辛毀戒破齋無慚無愧不孝父母不敬師長或作五逆犯四重禁謗方等經破塔壞寺侵損常住汙穢伽藍自作教他見作隨喜如是等罪無量無邊種類衆多率陳難盡若不懺悔由此惡業於當來世必墮三塗弟子今日生慚愧心生恐怖心對三寶前發露懺悔永斷相續不更敢犯所有諸罪願皆消滅如是三説敬禮常住三寶復語云願罪消滅菩提牙生復更語云如是志誠三遍懺悔所有諸罪悉皆滅盡身心清淨堪受如來清淨戒品知不知彼答云知歡喜不歡喜彼答云歡喜師應語云汝等若歡喜者禮謝三寶第五説法師應語云汝既身心清淨堪受近事五種學處然此五戒是在家戒若出家已則須受沙彌十戒年滿草則須受比丘具戒若是女語云若出家已則須受沙彌尼十戒年至十八則須受式叉六法滿草則須受尼大戒所以然者如人入海從淺至深入佛法海亦復如是若不爾者則失入法次第不合軌儀又以衆生得道時異故設三品漸次而受故優婆塞戒經云是戒能為沙彌十戒大比丘戒及菩薩戒乃至阿耨菩提而作根本志心受持優婆塞戒則能獲得如是等戒無量利益若有毀破如是戒者則於無量世中處三惡道受大苦惱已上經文既知損益理殊浮沉事別若欲棄損就益必須專意受持汝等盡能志心受不彼答云能復語云汝等當知戒是有為不能自起假因緣力方乃發生其緣者何則三歸教法能授戒師要師秉法方得戒故其因者何即是汝等求受戒心要有方便乃得戒然求戒心有其九品必須發起上上品心若上上品心者總有七種我今問汝隨我問答問云第一於戒起殷重心能持不被答云能第二誓斷一切惡能持不答能第三誓修一切善能不答能第四誓求無上菩提能不答能第五誓度一切衆生能不答能第六專心護持求不毀犯能持不答能第七一心承受更不異緣能不答能已上五問廣略隨時也第六正發律儀師應語云汝等既能發此上上品心必當受得上上品戒發在三歸言下三歸三竟六遍滿足便得律儀向前三歸但是翻邪不發戒品遍通五道與授皆成今三歸親能發戒唯局人中不霑餘趣就就人趣內除北俱盧洲唯三天下人得受此戒就三洲人身須具足若男若女皆得律儀或盲聾喑啞黃門二形諸根不具亦不得戒既知此戒得緣難遇必假從師無容自受吾雖崇德濫為師範責法重人事須禮請敬禮三拜䠒跪請云大德一心念我某甲今請大德為五戒阿闍梨願大德為我作五戒阿闍梨我依大德故得受近事戒慈愍故如是三説準佛阿毗曇十戒又例彼請也師應答云可爾復應語彼云也汝等既知五戒發在三歸言下我今為汝秉此教汝等各稱己名䠒跪合掌隨我語説分明領受勿前勿俱儻若錯亂戒品不發如是語已方與受云我某甲歸依於佛兩足中尊歸依於法離欲中尊歸依於僧諸衆中尊我受五戒盡形律儀願尊憶持慈悲護念如是三説遍遍皆須分折告示又應語云此三歸三遍了更三竟三遍在汝可一心須受語已教云我某甲歸依於佛兩足尊竟歸依於法離欲尊竟歸依於僧衆中尊竟我受五戒盡形律儀願尊憶持慈悲護念如是三説亦須遍遍警䇿分折告示説兩遍了語云更一遍在正是得戒時汝等一心承受説第三遍了語云汝已得戒此三歸詞句亦依最勝無比經我受已下依俱舍論云自稱我是塢婆素迦願尊憶持慈悲護念爾時便發五戒律儀已上論文要加此語方乃得戒陳翻邪故師復語云如是三歸三竟六法滿足近事五戒已注汝身知不知彼答云知師復問云歡喜不歡喜彼答云歡喜師應語云汝於過去曾種善根今生方得佛戒霑身若無宿善不可值遇汝等各須深自慶幸禮謝三寶準最無比經受五戒功德比前受三歸次十善次八戒所獲功德百分千分萬分億分乃至塢波尼殺曇分不及其一又準經五戒各有五神護第七示相護持師應語云汝雖得戒未識戒相若不識相恐汝遇緣毀犯佛戒我當為汝説五戒問汝能持不則須答言能語已説云善男子諦聽如來至真等正覺説近事五戒法此總標勑聽準律中具戒文若善女人或衆同受離合隨時自下別列及結準律中受十戒文盡形壽不殺生是近事戒能持不答能盡形壽不偷盜是近事戒能持不答能盡形壽不邪淫是近事戒能持不答言能言邪者總有五義一非境是他妻妾二非道設是己妻口及餘道三非時乳兒時受齋時懷胎時四非處佛像殿塔伽藍及露處五非量一夜不過五度復須避三明六暗三明者日月燈火暗者即六齋夜也盡形壽不妄語是近事戒能持不答能盡形壽不飲酒是近事戒能持不答言能總結云此是近事五戒盡形壽不得犯能持不答能發願回向第八師應語云汝等戒體已得戒相已識必須精持勿令毀缺然此戒前四是性後一是遮若於前四性重戒中隨犯一事必邊罪人內教不收棄之法外設縱發心再受五戒唐勞設法戒必不發或若出家求受十戒及具足戒普皆不發必彰戒難既知如此努力堅持汝當供養三寶勤修福業孝順父母善事師長承受教法不得違此結勸詞句梵網經及四分律隨義安立也䠒跪合掌回向發願弟子某甲等所有聽聞正法生淨信心稽請聖賢歸依三寶懺除罪垢受佛尸羅功德無邊塵沙難算總將回施法界衆生願皆離苦得安穩樂捨邪歸正發菩提心行菩薩道求不退轉於當來世一時成佛故維摩經云富有七財寶教授以資自加行所説修行回向為大利次明授八戒法法事次第八門準前説受由序第一若夫繩墨是匠人之宏規斤斧由茲運作淨戒是行者之根本定慧從茲發生則知三乘聖道籍此為因八輩真僧由斯證果故遺教經云依因此故得生諸禪定及滅苦智慧已上經文既知戒是衆行之本受者須有信心若也不起信心戒品無由得發故智度論云如經説信為手如人有手入寶山中自在取寶有信亦如是入佛法無漏根力覺道禪定寶山中自在所取如無手人入寶山中不能有所取無信亦如是入佛法寶山中都無所得又云信是道源功德母出生一切諸善法長養無上菩提樹已上論文由此五根五力以信為初七聖財中用信為首汝等今於三世因果三寶福田深生淨信能持不能者答言能師汝等既能發淨信心是則堪受如來淨戒戒是何義今汝受持梵曰尸羅唐言淨戒戒則能防身語不造七非淨則洗滌塵勞不起三毒故阿難言世尊為欲調伏貪嗔恚愚令盡故與諸弟子制戒是知心猿蕩逸意馬𮘵踈要假銜鎖方能控御故五分戒云心馬馳惡道放逸難禁制佛説忉戒行亦如利轡勒繫心莫放逸由如猿猴著鎖又智度論云惡病之中戒為良藥大恐怖中戒為守護死暗冥中戒為明燈三惡道中戒為橋梁五怖海中戒為船筏如大乘律作如是言持戒淨身口攝心正憶念多聞生實智斯由戒為本戒為清涼池澡浴諸熱惱戒為究竟伴能過險惡道戒為妙樓閣聖者之所遊戒為法城塹能遮煩惱賊戒為勇猛將能破魔軍衆戒為如意珠能與商人寶持戒為平地坐禪為窟宅説法得成佛斯由戒為本已上論文是知德廣難思功深叵測我今以此殊勝戒法授與汝等好不好彼答云好又應問云願受不願受答云欲受師應間云若願受者敬禮常住三寶第二請聖證明軌則如前五戒中説但末後結云弟子今日捨邪歸正懺洗罪𠎝求受如來八關齋戒惟願三寶等第三師應語云汝等當知凡欲受戒者必須歸依三寶淨治三業所以然者緣身是凡夫流浪日久煩惱病重生死海仗三寶威神除三毒重病託三寶之勢力出三有苦海斯則佛號良醫法稱妙藥僧為看病者能除衆生煩惱病故又佛喻船師法如舟楫僧為棹者能運衆生出苦海故以有是益令汝歸依䠒跪合掌隨貧道説詞句問答等如前五戒文説第四懺除往業詞句亦如前説第五説法開導師應語云汝等垢纍已除身器清淨堪受如來清淨戒品或有多種不可具除今將受者是八關齋戒如世間人開閇門戶不令賊入今以齋戒開閇諸根不令入亦復如是然此八戒名近住戒梵曰塢波婆娑唐云近住以一日一夜全修梵行親近出家人住故名近住又以時促亦名近住復名長養長養薄少善根人故佛知彼人善根淺薄不能長時淨修梵行且令一日一夜隨佛出家使其善根漸漸增長故俱舍論引經頌云由此能長養自他善淨心是故薄伽梵説此名長養已上論文所以八戒唯一晝夜以受戒時分唯有二種一約晝夜以明暗更迭易了知故二約盡形以壽命限齊易了知故由此俱舍業品頌云近住於晨旦下座從師受隨教説具支離嚴飾晝夜又無量壽觀經云日日如是授王八戒以此證知唯一晝夜此八關齋或是人中出家功德戒若能持者不失人身童子出家紹三寶種乃至修學得三菩提故俱舍論云然此八戒雖一晝夜所獲功德無量無邊受之不易假使閻浮提王所有珍寶欲以其價十六分中不及其一百分千分乃至塢波煞曇分亦不及一又婆娑論云帝釋聞説近住功德殊勝便以伽陀而讚曰六齋神足日奉持八戒齋彼功德殊勝則為與我等佛便訶云告苾芻衆此天帝釋所説伽陀違於道理若阿羅漢可作此説所以者何天帝具縛未得解脫如何説言受持此戒所獲功德而與我等天帝功德唯感天帝受八戒證三菩提故不應言但與我等已上於文若一一廣説持破果報恐此文繁復當別説則知功深若海德重如山我今以此勝妙功德授與汝等歡喜不歡喜彼答歡喜師語復云至心受能持不彼應答能師應語云能者敬禮常住三寶第五明了正發律儀第六師應語云汝等當知此八關齋戒發在三歸言下三歸三竟六遍滿足便即得戒各各䠒跪合掌自稱己名隨貧道語一心承受慎勿散亂誡已授云我某甲歸依於佛兩足中尊歸依於法離中尊歸依於僧諸衆中尊我受八戒日夜律儀願尊憶持慈悲護念如是三説遍遍皆須警䇿師應語云此是三歸更有三竟即便得戒汝一心受也我某甲歸依於佛兩足尊竟歸依於法離欲中尊竟歸依於僧衆中尊竟我受八戒日夜律儀願尊憶持慈悲護念如是三説亦遍遍警䇿説兩遍已語云此第三遍正發戒時汝一心領受説已語云汝已得戒了復應語云如是三歸三竟六遍滿足八關齋戒已注汝身知不知答云知又問云歡喜不歡喜答云歡喜復師語云由汝宿善深厚得遇佛法感此八關齋戒注汝身中汝等各各合掌敬禮常住三寶第七示相護持師應語云汝戒體已得戒相未知若不識相恐遇緣毀犯我今為汝説八戒相汝一心聽受問汝能不答我言能告已語云一日一夜不殺生是近住戒能持不答云能一日一夜不偷盜是近住戒能持不答云能一日一夜不淫欲是近住戒能持不答能象牙玳琩帖鏤等牀九尺一丈高廣之者此皆長慢增憍判之不許上師僧父母所居之床座縱使狹小亦不得上以是尊人所不合升座故也一日一夜不得過中食是近住戒能持不答云能若依有宗前塗佩哥觀合為第六高床第七過中第八此一是齋亦是齋支餘七是支而非齋依法密部六七不合都有九事則前八是戒後一是齋今依法密以同十戒故次結云此之八事前六是戒後一是齋此是近住八關齋戒始從今晨至明清旦一日一夜不得犯能持不答云能第八發願回向法式同前上來八戒了別出廣陳損益善惡因果義數而立也言八關者斯則關八惡門開八善戶得八自在遊八正路八惡者何煞生有斬身之病偷盜有貧苦之殃淫欲有銅柱鐵牀之憂妄語有苦耕犁之患飲酒感愚癡之果食肉為病患之因花鬘莊飾塗瑩香油增長欲心障生淨土歌儛倡妓故往聽觀縱蕩身心喪失善利高牀廣座益我慢心過中噉食生餓鬼道大師慈愍施設戒關關彼八門不令惡入由斯義故標以關名若與受五戒者借此語用亦得應云關五惡門關五善戶得五神通永超五趣五惡者何當次第為説八善者何不殺有長命之果當證金剛不壞之身不盜為富樂之因必得財盈寶滿不淫有清淨之報永離胞胎實語不誑有情果位成諦遠酒感有智之果斷肉得無病之因若能不塗飾脂粉不戴佩花瓔當得相好嚴容塵水不著見者恭敬聞者發心若捨離歌舞不住觀聽當得殊勝威儀梵音深妙若不處高牀廣座謙下卑恭當感師子之牀金剛寶座過中不食知足行成後世餘糧常餐法喜既知惡招苦果善是樂因汝等必須斷惡修善發殷重心求受如來八關齋戒能不能別出廣示戒相依長爪梵志經善男子等諦聽女人隨稱諸佛世尊從初發心乃至成佛於其中間常行慈悲種種方便救護衆生終不起心而行殺害由不殺故今得成佛遂感金剛不壞堅固法身常住慧命無有窮盡汝等凡夫若一人云汝是凡夫具足煩惱未能如佛長劫修行且一日一夜隨佛出家為我如來八戒弟子從今清旦受持如來第一淨戒不殺生能持不答云能善男子等諦聽諸佛世尊初發心乃至成佛於其中間常行饒益種種財寶惠施衆生終不起心而盜竊由不盜故今得成佛遂感手指纖長網縵之相七聖財寶受用無窮汝等凡夫具足煩惱未能如佛長劫修行且一日一夜隨佛出家為我如來八戒弟子從今清朝至明清朝受持如來第二淨戒不偷盜能持不答云能善男子等諦聽諸佛世尊從初發心乃至成佛於其中間常修梵行男女色相尚不眼觀何況起心而行淫欲我佛世尊由不淫欲故今得成佛遂感諸根圓滿色力具足馬王藏相莊嚴法身汝等凡夫具足煩惱未能如佛長劫修行且一日一夜隨佛出家為我如來八戒弟子從今清朝至明清朝受持如來第三淨戒不淫欲能持不答云能善男子等諦聽諸佛世尊從初發心乃至成佛於其中間常修實語終不虗妄誑惑衆生由不妄語今得成佛遂感廣長舌相自覆面輪乃至展轉上至梵世傍亘大千為真語者為實語者為如語者不誑語者不異語者所言誠諦聞皆信受汝等凡夫具足煩惱未能如佛長劫修行且一日一夜隨佛出家為我如來八戒弟子從今清朝至明清朝受持如來第四淨戒不妄語能持不答云能善男子等諦聽諸佛世尊從初發心乃至成佛於其中間常修正慧終不飲酒故行放逸我佛世尊由不飲酒今得成佛遂感遊行無畏如師子王智慧光明如日之照汝等凡夫具足煩惱未能如佛長劫修行且一日一夜隨佛出家為我如來八戒弟子從今清朝至明清朝受持我如來第五淨戒不飲酒能持不答云能善男子等諦聽諸佛世尊從初發心乃至成佛於其中間常修質素終不塗營香油花瓔莊飾歌儛倡伎故往視聽我佛世尊由持是戒今得成佛遂感卅二相八十種好身如紫金色圓光一尋足蹈千輪胸題萬字舉體香潔塵水不著威儀殊勝梵音深妙汝等凡夫具足煩惱未能如佛長劫修行且一日一夜隨佛出家為我如來八戒弟子從今清朝至明清朝受持如來第六淨戒不塗飾香油戴佩花瓔歌儛觀聽能持不答云能善男子等諦聽諸佛世尊從初發心乃至成佛於其中間常修謙下卑恭終不貢高憍慢牀廣座曾未輒升尊長所居不敢輒坐由持是戒今得成佛遂感金剛寶座周百餘步上窮地際下據金輪身登此座降魔成道汝等凡夫具足煩惱未能如佛長劫修行且一日一夜隨佛出家為我如來八戒弟子從今清朝至明清朝受持如來第七淨戒不發高牀廣坐能持不答云能善男子等諦聽諸佛世尊從初發心乃至成佛於其中間修一食一座一團少欲知足終不貪嗜衆味破齋夜食我佛世尊由持此戒今得成佛遂感齒白四十齊密白如珂雪取餐衆味皆成甘露法喜為食禪悅為漿以自充之無飢渴想汝等凡夫具足煩惱未能如佛長劫修行且一日一夜隨佛出家為我如來八戒弟子從今清朝至明清朝受持如來第八淨戒不過中食能持不答云能略授菩薩戒夫法體常凝假修而方有報身圓滿必藉因而尅成是以三僧企耶行菩薩道一百大劫修妙相因超十地而二障雙除坐千花而四智齊證故得十方諸佛放光灌頂一念之頃成盧舍那應十地報身隨二乘而現化質斯則七歲出家三十成道處金剛花王座號曰釋迦牟尼於是初結木又心地標品創宣戒法梵網題經開菩提之正因涅槃之真路過去恆沙諸佛皆因此戒得成汝等若能受者當來悉得成佛故經云汝是當成佛我是已成佛常作如是信戒品已具足一切有心者皆應攝佛戒衆生受佛戒即入諸佛位位同大覺已真是諸佛子又經欲受國王位時受轉輪王位時百官受位時應先受菩薩戒一切鬼神救護王身百官之身諸佛歡喜又下文云若不受佛戒者生生不見三寶如木石無異名為外道邪見人輩畜生無異木頭無異已上經文以是義故我今勸汝受菩薩戒汝等當知此菩薩戒於諸律儀最為殊勝無上第一不同二乘別解脫律儀且如八戒唯一晝夜明日清旦任運即捨豈得多時五戒十戒及具足戒但一形命終即捨後身寧有此菩薩戒一得在身直至菩提中間無捨既知此戒是成佛之因汝等必須發起殷重信心生難遇之想凡入佛法先須起信信是道源功德母汝等今須深信自身及一切有情皆有佛性深信自身及一切有情悉得菩提如是深信汝能發不答云能復語云汝等既能發此真淨信心我當與汝受菩薩真淨戒品夫欲受佛戒者先須啓請三寶證明次受四不壞信法然後洗身心三聚淨戒䠒跪合掌隨吾説詞句可知啓請已準佛藏經次信應受四不壞信應云賢聖既集為汝證明汝當至心皈佛法僧及清淨戒虔誠合掌隨吾語説授云弟子某甲皈依佛不可壞皈依法不可壞皈依僧不可壞皈依正法戒不可壞三説已復云汝今既能皈依三寶及清淨戒是真佛子佛境中乃至失命因緣誓不壞此信能持不彼答云能次復語云我已與汝授四不壞信竟次當與汝授三聚淨戒凡受戒者先須悔除己業懺往𠎝身器晈然方堪進受譬如世間上饌不可置於弊器之中出世尸羅豈得授於有過身內悔詞可知次復語云汝今既能懺洗罪𠎝身心清淨堪受如來清淨禁戒此名三聚淨戒一攝律儀戒二攝善法戒三攝衆生戒此三聚淨戒所緣亦三第一緣一切惡以未受戒前不斷諸惡遍一切境皆是罪緣今將受戒亦云心猒惡翻前罪處律儀備生然境雖多總束為二一者有情二者非情周遍十方無不得戒故俱舍論十五云無有不遍於諸有得律儀者以一切諸有情所住善意樂方得律儀異則不然以惡意樂不全息故又云若人不作五種定限方可受得別解脫律儀言五定者謂有情戒處時緣定已上經文言有情定者若念言於此有情我斷諸惡於彼有情我不能斷作此心者戒則不發言戒定者若作念言煞盜等戒我即能斷妄語等戒我不能斷作此心者戒亦不發言處定者若作念言於此國土多人識知我即能斷於彼國土無人識知我不能斷作此心者亦不得戒言時定者若作念言我三五年中即能斷惡過是已後我不能斷作此心者亦不得戒言緣定者若作念言我不遇緣即斷惡若也遇緣逢惡入陳我即不能斷作此心者亦不得戒是名五定汝等既知心有定限戒法不生今須將心普緣盡十方界情非情境誓斷一切惡能持不彼應答云能又應語云汝等當知此斷惡心即是攝律儀戒故瑜伽論第四十云律儀戒者謂菩薩所受七衆別解脫律儀乃至廣説準此先次第受七衆律儀後方得受菩薩淨戒又菩薩善戒經云菩薩摩訶薩成就善戒攝律儀戒成就善戒攝善法戒成就利益衆生戒攝衆生戒先當具足學優婆塞沙彌戒比丘戒若言不具優婆塞戒得沙彌戒無有是處不具沙彌戒得比丘戒亦無是處女人亦説不具如是三種戒者得菩薩戒亦無是處譬如重樓四級次第不由初級至第二級者無有是處不由二級至於三級不由三級至四級者亦無有是處若準梵網經文解語皆得故經云比丘比丘尼優婆塞優婆夷國王王子大臣百官庶民黃門淫男淫女奴婢八部鬼神畜生乃至變化人但解法師語盡受得戒皆名第一清淨者又菩薩瓔珞經云攝律儀戒者所謂十波羅蜜謂布施等六方便力回第二緣一切境修一切善謂三業勤修一切菩提資糧令使圓滿假使三千大千世界劫火洞然於中若有微少善根菩薩發心當於此劫火之中修少善根汝等今時於佛所説三藏教法戒定慧等一切行門不惜身命盡當修學能持不被答云能又應語云汝若少分善作限定心不擬修者戒亦不發汝等當知此修善心不是攝善法戒因故瑜伽論云攝善法戒者謂諸菩薩受戒後所有一切為大菩提由身語意積集諸善總説名為攝善法戒乃至廣説又菩薩瓔珞經云攝善法戒者所謂八萬四千法門第三緣一切有情起度脫心以慈悲喜捨誓救群品於怨親境平等普濟以佛世尊昔因地時發弘誓願今得成佛廣度有情汝等盡能發是心不彼答云能次復語云汝若下至於一有情作限定心不擬度者戒亦不發汝等當知此度衆生心即是饒益有情戒故瑜伽論云饒益有情戒者當知此戒略有十一相何等十一謂諸菩薩於諸有情能引義利彼彼事業與作助伴於諸有情隨所生起病等苦時瞻侍病者等亦作助伴乃至廣説又菩薩瓔珞經云攝衆生戒者所謂慈悲喜捨次總結云此是三聚淨戒所緣境想汝等當知欲受戒者先須請師故梵網經云請二師和尚阿闍梨準此即是出家菩薩有德行者不簡凡聖先請和上次請闍梨闍梨牒和上名入羯磨中受與彼戒若準普賢觀經令請本師釋迦牟尼佛為和上文殊菩薩為羯磨阿闍梨彌勒菩薩為教授阿闍梨十方諸佛為證戒師十方菩薩為同學伴侶時人共行詞句可知今不依之所以者何以彼普賢觀經是自誓受戒此是從師授與彼有異故梵網經云若千里內無能受戒師得佛菩薩形像前自誓受戒次復應語云又彌勒菩薩所説受戒羯磨云若諸菩薩欲學菩薩三聚淨戒或是在家或是出家先於無上正等菩提發願已當訪求同法菩薩已發大願有智有力於語表義能授能開於如是等功德具足勝菩薩所先禮雙足偏袒右肩膝輪據地合掌恭敬如是請言大德憶念我某甲於大德所乞受一切菩薩淨戒唯願須臾不辭勞倦慈愍聽受如是三説應持者等教請請法如上唯此教又準請一師此即親發戒師亦不言請佛請師語云可爾次云汝等當知若欲受菩薩戒者必須身無遮難若也身有遮難設受戒亦不生梵網經二師應問言汝有七遮罪不若現身有七遮師不應與受我今問汝汝隨我問答若有言有若無言無問云汝不曾出佛血不汝不殺父不汝不殺母不汝不殺和上不汝不殺阿闍梨不汝不破羯磨轉法輪僧不汝不殺聖人不若言無有次應語云汝等既能無遮難堪受菩薩戒凡欲受菩薩戒者先發菩提心次行菩薩行後方得受菩薩淨戒若不爾戒品不生汝等盡能發菩提心不若一人除等盡二字彼應答云能次復語云也菩提心者四弘誓願準前聖教先自發願後方請師汝未知我今教汝䠒跪合掌隨吾語説教云我某甲俗人稱弟子若出家稱比丘等衆生無邊誓願度煩惱無盡誓願斷法門無量誓願學無上菩提誓願成三説已次語云汝已發菩提心次須行菩薩行者即六波羅蜜第一布施波羅蜜多然菩薩行施異於二乘見來乞者衣服飯食頭目髓腦身肉手足國城妻子象馬七珍奴俾㒒從隨所須不生慳吝盡將施與若復有人從己求法以無染心隨解為説雖行布施不求人天富樂果報普為法界有情回向無上菩提故金剛般若經云菩薩所作福德不應貪著如此布施汝能行不第二持戒亦異二乘聲聞緣覺但禁身語不制心𠍴菩薩持戒起心故即犯涅槃經云若見男子女相隨之時便起欲想雖不親近是名破戒汙辱梵行汝等盡不起心不第三忍辱假使有人以刀杖等解其支節不起一念瞋恚之心故般若經云如我昔為哥利王割截身體我於爾時無我無人相無衆生相無受者相應生瞋恨已上經文汝等當知若起瞋心不名忍辱汝等盡能如是忍不第四精進謂晝夜六時䇿勵三業勤修速進直至菩提於其中間不生疲倦如佛世尊於因地時日行遇見底沙如來坐寶龕中入火界定光明赫奕特異於常遂以無怠淨心至誠瞻仰忘下一足經七晝夜以妙伽陀而讚彼佛由斯精進便超彌勒九劫於先證大菩提如是精進汝等能行不第五禪定攝心不亂湛然安靜妄想不生汝能行不第六智慧了智一乘不起二相永除疑惑深達本源汝能行不彼皆應答云能次復語云汝等既能發菩提心行菩薩道即是菩薩我今問汝隨我問答問云汝是菩薩不彼答云是發菩薩心未答已發次語云汝等今欲求無上等覺欲度一切無邊苦者當於此戒作難遭心生希有想如病得醫如飢思食等所以爾者為此戒是趣菩提之根本故華嚴經云戒是無上菩提本應當具足持淨戒等既知如此我今為汝授諸菩薩一切淨戒有三翻羯磨第三滿足戒品即生汝須領受若不領受戒終不發汝須專思不得餘思餘想如是心心相次念念相續一心承受能不彼答云能次依彌勒羯磨正與授戒應云善男子諦聽汝今欲於我所求受諸菩薩一切學處求諸菩薩一切淨戒謂律儀戒攝善法戒饒益有情戒如是學處如是淨戒過去一切菩薩已具未來一切菩薩當具現在一切菩薩今具於是學處於是淨戒過去一切菩薩已學未來一切菩薩當學現在一切菩薩今學汝能受不如是至三每遍皆須令彼諦聽次依彌勒羯磨啓告佛菩薩與作證明云仰啓十方無邊無際諸世界中諸佛菩薩今於此間現有某甲菩薩於我某甲菩薩所乃至三説受菩薩戒我為作證唯願十方無邊無際諸世界中諸佛菩薩第一真聖於現不現一切時處一切有情皆現學者於此某甲受菩薩戒亦為作證如是至三次應示相云善男子諦聽如來至真等正覺説菩薩十重波羅夷法若佛子犯一一波羅夷法非菩薩非佛弟子即失四十二賢聖法已上勑聽總舉準義加也下即依瓔珞經下卷云佛告汝經無汝字義加從今身至佛身盡未來際於其中間不得殺生準梵網經應云一切有命者不得故殺也若有犯者非菩薩行失四十二賢聖法不得犯能持不彼答云能餘亦爾第二不得偷盜第三不得淫欲第四不得妄語第五不得沽酒第六不得説在家菩薩出家菩薩比丘比丘尼罪過第七不得自讚毀他第八不得慳貪吝財第九不得嗔情非情第十不得毀謗三寶一一如初次結云此是菩薩十重波羅夷法乃至成佛不得犯能持不彼答云能次復語云四十八輕廣如經説乃至成佛盡持不得犯能不彼答云能次勸修云汝已得戒竟法事成就衆行滿足汝當善受教法勸化作福治塔供養衆僧孝順父母恭敬師長和上阿闍梨如法教勑不應違逆汝應誦十重四十八輕戒依之修行得無上果此三聚淨戒能修行者感佛三身成佛三德謂律儀戒感佛法身成就斷德攝善法戒感佛報身成就智德饒益有情戒感佛化身成就恩德既知利益廣大必須精勤護持乃不得犯如微塵許何況具犯十戒若有犯者不得現身發菩提心亦失國王位亦失轉輪王位亦失百官位亦失比丘比丘尼位亦失十發趣十長養十金剛十地佛性常住妙果一切皆失墮三惡道中二劫三劫不聞父母三寶名字以是不應一一犯餘未知者當問和上闍梨及同學戒者各各虔誠回向發願如常可知問受菩薩戒已若人來從乞頭目手等若不與者即是犯戒若當與者未辨此心如何可得答若遇此緣應説偈向出像法決疑經我今初發心善根未成熟願我即成熟後必當相與此受戒儀者是青龍寺法全大師分付珍傳日本仍令抄出充流通本比丘深智寫書比丘忍勢勘比丘三惠裝元慶五年九月草八日比丘記延久五年正月十七日書持校勘了康治元年六月一日以實相房御本寫之良修記
